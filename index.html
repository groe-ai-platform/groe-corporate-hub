<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stork Delivery | GROE ENT</title>
    <style>
        :root { --navy: #001f3f; --red: #d32f2f; --gold: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; }
        .header { background: var(--navy); padding: 40px; text-align: center; border-bottom: 5px solid var(--red); color: white; }
        .cat-bar { display: flex; gap: 20px; padding: 20px; background: white; overflow-x: auto; border-bottom: 1px solid #ddd; }
        .cat-card { text-align: center; font-weight: bold; min-width: 80px; font-size: 0.8rem; }
        .cat-card img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #eee; object-fit: cover; }
        .card { background: white; margin: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; max-width: 500px; margin: 20px auto; }
        .btn { width: 92%; margin: 15px; padding: 15px; background: var(--red); color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h1>STORK DELIVERY</h1>
        <p style="color: var(--gold);">GROE Entertainment Headquarters</p>
    </div>
    <div class="cat-bar">
        <div class="cat-card"><img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=100"><div>Pizza</div></div>
        <div class="cat-card"><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=100"><div>Burgers</div></div>
        <div class="cat-card"><img src="https://images.unsplash.com/photo-1594179047519-f347310d3322?w=100"><div>Fast Food</div></div>
    </div>
    <div class="card">
        <div style="height: 200px; background: url('https://images.unsplash.com/photo-1627626775846-122b778965ae?w=600') center/cover;"></div>
        <div style="padding: 15px; text-align: center;">
            <h3>GROE Gourmet Pizza</h3>
            <p>30-40 min • <span style="color:#2e7d32; font-weight:bold;">FREE DELIVERY</span></p>
            <button class="btn">ORDER NOW</button>
        </div>
    </div>
</body>
</html>
