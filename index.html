<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperStorkDelivery | GROE ENT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --stork-blue: #004a8c; --stork-red: #e31837; --bg-gray: #f7f7f7; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg-gray); }

        /* Header Layout */
        .header { background: var(--stork-blue); padding: 10px 5%; display: flex; flex-direction: column; align-items: center; gap: 10px; sticky: top; z-index: 1000; }
        .logo-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; }
        .mascot { height: 50px; }
        .search-container { background: white; border-radius: 8px; display: flex; align-items: center; width: 100%; max-width: 600px; padding: 8px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .search-container input { border: none; width: 100%; outline: none; font-size: 14px; margin-left: 10px; }
        .location-bar { display: flex; align-items: center; color: white; font-size: 12px; gap: 5px; width: 100%; justify-content: center; }

        /* Category Icons */
        .cat-nav { display: flex; justify-content: space-around; background: white; padding: 15px 0; border-bottom: 1px solid #ddd; }
        .cat-box { text-align: center; font-size: 11px; font-weight: bold; color: #444; }
        .cat-box i { display: block; font-size: 24px; color: var(--stork-blue); margin-bottom: 5px; }
        .cat-box img { width: 35px; height: 35px; display: block; margin: 0 auto 5px; }

        /* Featured & Grid */
        .main { padding: 15px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; font-weight: bold; color: #222; }
        .featured-card { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 3px 10px rgba(0,0,0,0.08); }
        .featured-img { height: 180px; background: url('https://images.unsplash.com/photo-1627626775846-122b778965ae?w=800') center/cover; position: relative; }
        .tag { position: absolute; top: 10px; left: 10px; background: white; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .small-card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .small-img { height: 100px; background-size: cover; background-position: center; }
        .card-info { padding: 8px; }
        .card-info h4 { margin: 0; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta { font-size: 10px; color: #777; margin-top: 4px; }
        .free-del { color: #2e7d32; font-weight: bold; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; font-size: 10px; color: #888; }
        .nav-item.active { color: var(--stork-blue); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 2px; }

        .cart-fab { position: fixed; bottom: 70px; right: 20px; background: var(--stork-blue); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-row">
        <img src="https://groeentertainment.com/wp-content/uploads/2024/03/Stork_Logo_With_Bags-1024x1024.png" class="mascot">
        <h2 style="color:white; margin:0; font-size: 18px; font-style: italic;">SUPERSTORK <span style="font-weight: 300;">DELIVERY</span></h2>
    </div>
    <div class="search-container">
        <i class="fas fa-search" style="color:#888;"></i>
        <input type="text" placeholder="Search restaurants, groceries, fast food...">
    </div>
    <div class="location-bar">
        <i class="fas fa-map-marker-alt"></i> <span>Richton Park, IL</span> <i class="fas fa-chevron-down" style="font-size: 8px;"></i>
    </div>
</div>

<div class="cat-nav">
    <div class="cat-box"><i class="fas fa-utensils"></i>Restaurants</div>
    <div class="cat-box"><i class="fas fa-shopping-basket"></i>Groceries</div>
    <div class="cat-box"><i class="fas fa-hamburger"></i>Fast Food</div>
    <div class="cat-box"><i class="fas fa-store"></i>STORK Groe</div>
    <div class="cat-box"><i class="fas fa-gift"></i>Gifts</div>
</div>

<div class="main">
    <div class="section-header">Featured: GROE Gourmet Pizza - Free Delivery!</div>
    <div class="featured-card">
        <div class="featured-img">
            <div class="tag">FREE DELIVERY</div>
        </div>
    </div>

    <div class="section-header">Nearby in Richton Park <span style="color:var(--stork-blue); font-size:12px;">See All</span></div>
    
    <div class="grid">
        <div class="small-card">
            <div class="small-img" style="background-image: url('https://images.unsplash.com/photo-1594179047519-f347310d3322?w=300')"></div>
            <div class="card-info">
                <h4>Illinois Bass & BBQ</h4>
                <div class="meta">4.8 <i class="fas fa-star" style="color:gold;"></i> 25 min</div>
                <div class="meta free-del">FREE Delivery</div>
            </div>
        </div>
        <div class="small-card">
            <div class="small-img" style="background-image: url('https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300')"></div>
            <div class="card-info">
                <h4>GROE Gourmet Pizza</h4>
                <div class="meta">4.9 <i class="fas fa-star" style="color:gold;"></i> 25 min</div>
                <div class="meta free-del">FREE Delivery</div>
            </div>
        </div>
    </div>
</div>

<div class="cart-fab">
    <i class="fas fa-shopping-cart"></i>
</div>

<div class="bottom-nav">
    <div class="nav-item active"><i class="fas fa-home"></i>Home</div>
    <div class="nav-item"><i class="fas fa-search"></i>Search</div>
    <div class="nav-item"><i class="fas fa-list-alt"></i>Orders</div>
    <div class="nav-item"><i class="fas fa-user"></i>Account</div>
</div>

<script>
    console.log("SuperStorkDelivery UI Loaded.");
</script>

</body>
</html>
